# Istio Workflow Test Flake Fix And Skip Workflow

## Action

Follow the test-flake-fix-and-skip-workflow workflow:
1. Identify the flaky or failing test and its root cause (race, timeout, environment mismatch).
2. Modify the test code to fix the race (e.g., use EventuallyEqual, add helper functions, increase retry timeouts).
3. Add logic to skip the test if prerequisites are not met (e.g., check for Gateway API CRD support, Kubernetes version).
4. Refactor or extract helpers for repeated skip logic.
5. Optionally, revert or adjust previous fixes based on reviewer feedback.
6. Commit changes to the relevant test files.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: tests/integration/ambient/cni/main_test.go, tests/integration/ambient/cnirepair/main_test.go, tests/integration/ambient/cniupgrade/main_test.go

